---
- name: "Configuration de la Réplication PostgreSQL"
  hosts: db_master
  become: true

  tasks:
    - name: "Écouter sur toutes les interfaces réseau (postgresql.conf)"
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/postgresql.conf
        regexp: "^#?listen_addresses\\s*="
        line: "listen_addresses = '*'"
      notify: Redémarrer PostgreSQL

    - name: "Autoriser le réseau local dans pg_hba.conf"
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/pg_hba.conf
        line: "host    all             all             10.0.10.0/24            scram-sha-256"
      notify: Redémarrer PostgreSQL

    - name: "Autoriser l'utilisateur postgres pour la réplication (pg_hba.conf)"
      ansible.builtin.lineinfile:
        path: /etc/postgresql/16/main/pg_hba.conf
        line: "host    replication     postgres        10.0.10.0/24            trust"
      notify: Redémarrer PostgreSQL

  handlers:
    - name: Redémarrer PostgreSQL
      ansible.builtin.service:
        name: postgresql
        state: restarted